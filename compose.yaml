services:
  backend:
    build: backend
    ports:
      - 3000:3000
    environment:
      - POSTGRES_DB=labster
    networks:
      - labster
  frontend:
    build: frontend
    ports:
      - 3010:3010
    networks:
      - labster
  db:
    image: postgres
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - labster
    environment:
      - POSTGRES_DB=labster
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
    expose:
      - 5432
volumes:
  db-data:
networks:
  labster:
